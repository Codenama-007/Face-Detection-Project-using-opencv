<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face ID Enrollment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: var(--surface-color);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h2 {
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .video-container {
            width: 100%;
            height: 300px;
            background: #000;
            border-radius: 0.5rem;
            overflow: hidden;
            margin-bottom: 1.5rem;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .input-group input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.875rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .btn:disabled {
            background: #334155;
            cursor: not-allowed;
            color: #94a3b8;
        }

        .message {
            margin-top: 1rem;
            font-size: 0.9rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            display: none;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
            display: block;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: block;
        }
        
        .nav-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
        }
        .nav-link:hover {
            color: white;
        }
        
        .start-session-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 1.5rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }
        .start-session-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6);
        }
        
        .tabs {
            display: flex;
            border-bottom: 1px solid #334155;
            margin-bottom: 1.5rem;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 1rem;
            cursor: pointer;
            font-weight: 500;
            font-size: 1rem;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .file-upload-zone {
            border: 2px dashed #334155;
            padding: 2rem;
            text-align: center;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .file-upload-zone:hover {
            border-color: var(--primary);
        }
        .file-list {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 1rem;
            background: #0f172a;
            border-radius: 0.5rem;
            padding: 0.5rem;
        }
        .file-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            border-bottom: 1px solid #1e293b;
        }
        .file-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
        }
        .file-item-info {
            flex: 1;
            display: flex;
            gap: 0.5rem;
        }
        .file-item-info input {
            padding: 0.4rem;
            border-radius: 4px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            width: 50%;
        }
    </style>
</head>
<body>

    <div class="container">
        <i data-lucide="scan-face" style="width:48px;height:48px;color:var(--primary);margin-bottom:1rem;"></i>
        <h2>Face ID Enrollment</h2>
        <p>Register your face for the CCTV monitoring system.</p>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('webcamTab', this)">Live Webcam</button>
            <button class="tab-btn" onclick="switchTab('uploadTab', this)">Bulk Upload</button>
        </div>

        <div id="webcamTab" class="tab-content active">
            <div class="video-container">
                <video id="webcam" autoplay playsinline></video>
            </div>

            <div class="input-group">
                <label for="studentName">Full Name</label>
                <input type="text" id="studentName" placeholder="e.g. John Doe" autocomplete="off">
            </div>

            <div class="input-group">
                <label for="studentId">Student ID</label>
                <input type="text" id="studentId" placeholder="e.g. STU-1002" autocomplete="off">
            </div>

            <button class="btn" id="captureBtn">
                <i data-lucide="camera"></i> Enroll Face ID
            </button>
        </div>

        <div id="uploadTab" class="tab-content">
            <div class="file-upload-zone" onclick="document.getElementById('fileInput').click()">
                <i data-lucide="upload-cloud" style="width:32px;height:32px;color:var(--text-secondary);margin-bottom:0.5rem;display:inline-block;"></i>
                <p>Click to select photos or ID cards<br><small style="color:var(--text-secondary)">Tip: Name files as "ID-Name.jpg" to auto-fill</small></p>
            </div>
            <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="handleFiles(this.files)">
            
            <div class="file-list" id="fileList"></div>
            
            <button class="btn" id="uploadAllBtn" disabled>
                <i data-lucide="upload"></i> Register All Selected
            </button>
        </div>

        <div id="statusMsg" class="message"></div>
        
        <hr style="border: 0; height: 1px; background: #334155; margin: 2rem 0;">
        
        <button class="start-session-btn" id="startSessionBtn">
            <i data-lucide="play-circle"></i> Start Exam Session & Enter Dashboard
        </button>
    </div>

    <script>
        lucide.createIcons();
        
        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
            
            // Re-render icons incase they are in hidden tabs initially
            lucide.createIcons();
        }

        const video = document.getElementById('webcam');
        const captureBtn = document.getElementById('captureBtn');
        const studentName = document.getElementById('studentName');
        const studentId = document.getElementById('studentId');
        const statusMsg = document.getElementById('statusMsg');

        // Access webcam
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                showMsg('Error accessing webcam: ' + err.message, 'error');
                captureBtn.disabled = true;
            });

        captureBtn.addEventListener('click', async () => {
            const name = studentName.value.trim();
            const id = studentId.value.trim();

            if (!name || !id) {
                showMsg('Please enter both Name and Student ID.', 'error');
                return;
            }

            captureBtn.disabled = true;
            captureBtn.innerHTML = '<i class="lucide-loader"></i> Processing...';

            // Capture frame from video
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.9);

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        student_id: id,
                        name: name,
                        image: dataUrl
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    showMsg('Successfully enrolled Face ID for ' + name + '!', 'success');
                    studentName.value = '';
                    studentId.value = '';
                } else {
                    if (response.status === 401) {
                        window.location.href = 'supervisor_login.html';
                        return;
                    }
                    showMsg(result.error || 'Failed to enroll face.', 'error');
                }
            } catch (err) {
                showMsg('Network error. Is the server running?', 'error');
            } finally {
                captureBtn.disabled = false;
                captureBtn.innerHTML = '<i data-lucide="camera"></i> Enroll Face ID';
                lucide.createIcons();
            }
        });

        function showMsg(msg, type) {
            statusMsg.textContent = msg;
            statusMsg.className = 'message ' + type;
        }

        const startSessionBtn = document.getElementById('startSessionBtn');
        startSessionBtn.addEventListener('click', async () => {
            startSessionBtn.disabled = true;
            startSessionBtn.innerHTML = '<i class="lucide-loader"></i> Starting...';
            try {
                const res = await fetch('/api/session/start', { method: 'POST' });
                if (res.ok) {
                    window.location.href = 'monitoring.html';
                } else {
                    if (res.status === 401) {
                        window.location.href = 'supervisor_login.html';
                        return;
                    }
                    let errText = await res.text();
                    showMsg('Failed to start session: ' + res.status + ' ' + errText, 'error');
                    startSessionBtn.disabled = false;
                    startSessionBtn.innerHTML = '<i data-lucide="play-circle"></i> Start Exam Session & Enter Dashboard';
                    lucide.createIcons();
                }
            } catch (err) {
                showMsg('Network error starting session', 'error');
                startSessionBtn.disabled = false;
            }
        });
        
        // --- BULK UPLOAD LOGIC ---
        let selectedFilesData = [];
        
        function handleFiles(files) {
            const fileListEl = document.getElementById('fileList');
            const uploadBtn = document.getElementById('uploadAllBtn');
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (!file.type.startsWith('image/')) continue;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    // Try to parse ID-Name from filename
                    let defaultId = "";
                    let defaultName = "";
                    const nameParts = file.name.split('.')[0].split('-');
                    if (nameParts.length >= 2) {
                        defaultId = nameParts[0].trim();
                        defaultName = nameParts.slice(1).join('-').trim();
                    } else {
                        defaultName = nameParts[0].trim();
                    }
                    
                    const fileId = Date.now() + i;
                    selectedFilesData.push({
                        id: fileId,
                        dataUrl: e.target.result,
                        studentId: defaultId,
                        studentName: defaultName,
                        status: 'pending'
                    });
                    
                    renderFileList();
                };
                reader.readAsDataURL(file);
            }
        }
        
        function renderFileList() {
            const fileListEl = document.getElementById('fileList');
            const uploadBtn = document.getElementById('uploadAllBtn');
            fileListEl.innerHTML = '';
            
            if (selectedFilesData.length === 0) {
                uploadBtn.disabled = true;
                return;
            }
            uploadBtn.disabled = false;
            
            selectedFilesData.forEach(item => {
                const el = document.createElement('div');
                el.className = 'file-item';
                
                let iconHtml = '';
                if (item.status === 'success') iconHtml = '<i data-lucide="check-circle" style="color:var(--success);width:20px;"></i>';
                else if (item.status === 'error') iconHtml = '<i data-lucide="x-circle" style="color:var(--danger);width:20px;"></i>';
                else if (item.status === 'uploading') iconHtml = '<i data-lucide="loader" style="color:var(--primary);width:20px;" class="lucide-spin"></i>';
                
                el.innerHTML = `
                    <img src="${item.dataUrl}">
                    <div class="file-item-info">
                        <input type="text" placeholder="ID" value="${item.studentId}" onchange="updateFileData(${item.id}, 'studentId', this.value)">
                        <input type="text" placeholder="Name" value="${item.studentName}" onchange="updateFileData(${item.id}, 'studentName', this.value)">
                    </div>
                    <div id="status-${item.id}">${iconHtml}</div>
                `;
                fileListEl.appendChild(el);
            });
            lucide.createIcons();
        }
        
        function updateFileData(id, field, value) {
            const item = selectedFilesData.find(x => x.id === id);
            if (item) item[field] = value;
        }
        
        document.getElementById('uploadAllBtn').addEventListener('click', async () => {
            const btn = document.getElementById('uploadAllBtn');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" class="lucide-spin"></i> Processing...';
            lucide.createIcons();
            
            for (let i = 0; i < selectedFilesData.length; i++) {
                const item = selectedFilesData[i];
                if (item.status === 'success') continue; // skip already uploaded
                
                if (!item.studentId || !item.studentName) {
                    item.status = 'error';
                    renderFileList();
                    continue;
                }
                
                item.status = 'uploading';
                renderFileList();
                
                try {
                    const response = await fetch('/api/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: item.studentName,
                            student_id: item.studentId,
                            image: item.dataUrl
                        })
                    });
                    
                    if (response.ok) {
                        item.status = 'success';
                    } else {
                        item.status = 'error';
                    }
                } catch (e) {
                    item.status = 'error';
                }
                renderFileList();
            }
            
            btn.innerHTML = '<i data-lucide="upload"></i> Register All Selected';
            btn.disabled = false;
            lucide.createIcons();
        });
        
    </script>
</body>
</html>
