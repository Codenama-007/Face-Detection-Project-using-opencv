<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face ID Enrollment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: var(--surface-color);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h2 {
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .video-container {
            width: 100%;
            height: 300px;
            background: #000;
            border-radius: 0.5rem;
            overflow: hidden;
            margin-bottom: 1.5rem;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .input-group input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.875rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .btn:disabled {
            background: #334155;
            cursor: not-allowed;
            color: #94a3b8;
        }

        .message {
            margin-top: 1rem;
            font-size: 0.9rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            display: none;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
            display: block;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: block;
        }
        
        .nav-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
        }
        .nav-link:hover {
            color: white;
        }
        
        .start-session-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 1.5rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }
        .start-session-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6);
        }
    </style>
</head>
<body>

    <div class="container">
        <i data-lucide="scan-face" style="width:48px;height:48px;color:var(--primary);margin-bottom:1rem;"></i>
        <h2>Face ID Enrollment</h2>
        <p>Register your face for the CCTV monitoring system.</p>

        <div class="video-container">
            <video id="webcam" autoplay playsinline></video>
        </div>

        <div class="input-group">
            <label for="studentName">Full Name</label>
            <input type="text" id="studentName" placeholder="e.g. John Doe" autocomplete="off">
        </div>

        <div class="input-group">
            <label for="studentId">Student ID</label>
            <input type="text" id="studentId" placeholder="e.g. STU-1002" autocomplete="off">
        </div>

        <button class="btn" id="captureBtn">
            <i data-lucide="camera"></i> Enroll Face ID
        </button>

        <div id="statusMsg" class="message"></div>
        
        <hr style="border: 0; height: 1px; background: #334155; margin: 2rem 0;">
        
        <button class="start-session-btn" id="startSessionBtn">
            <i data-lucide="play-circle"></i> Start Exam Session & Enter Dashboard
        </button>
    </div>

    <script>
        lucide.createIcons();

        const video = document.getElementById('webcam');
        const captureBtn = document.getElementById('captureBtn');
        const studentName = document.getElementById('studentName');
        const studentId = document.getElementById('studentId');
        const statusMsg = document.getElementById('statusMsg');

        // Access webcam
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                showMsg('Error accessing webcam: ' + err.message, 'error');
                captureBtn.disabled = true;
            });

        captureBtn.addEventListener('click', async () => {
            const name = studentName.value.trim();
            const id = studentId.value.trim();

            if (!name || !id) {
                showMsg('Please enter both Name and Student ID.', 'error');
                return;
            }

            captureBtn.disabled = true;
            captureBtn.innerHTML = '<i class="lucide-loader"></i> Processing...';

            // Capture frame from video
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.9);

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        student_id: id,
                        name: name,
                        image: dataUrl
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    showMsg('Successfully enrolled Face ID for ' + name + '!', 'success');
                    studentName.value = '';
                    studentId.value = '';
                } else {
                    if (response.status === 401) {
                        window.location.href = 'supervisor_login.html';
                        return;
                    }
                    showMsg(result.error || 'Failed to enroll face.', 'error');
                }
            } catch (err) {
                showMsg('Network error. Is the server running?', 'error');
            } finally {
                captureBtn.disabled = false;
                captureBtn.innerHTML = '<i data-lucide="camera"></i> Enroll Face ID';
                lucide.createIcons();
            }
        });

        function showMsg(msg, type) {
            statusMsg.textContent = msg;
            statusMsg.className = 'message ' + type;
        }

        const startSessionBtn = document.getElementById('startSessionBtn');
        startSessionBtn.addEventListener('click', async () => {
            startSessionBtn.disabled = true;
            startSessionBtn.innerHTML = '<i class="lucide-loader"></i> Starting...';
            try {
                const res = await fetch('/api/session/start', { method: 'POST' });
                if (res.ok) {
                    window.location.href = 'monitoring.html';
                } else {
                    if (res.status === 401) {
                        window.location.href = 'supervisor_login.html';
                        return;
                    }
                    let errText = await res.text();
                    showMsg('Failed to start session: ' + res.status + ' ' + errText, 'error');
                    startSessionBtn.disabled = false;
                    startSessionBtn.innerHTML = '<i data-lucide="play-circle"></i> Start Exam Session & Enter Dashboard';
                    lucide.createIcons();
                }
            } catch (err) {
                showMsg('Network error starting session', 'error');
                startSessionBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
