<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proctor Dashboard | Multi-Student Tracking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Premium Header -->
        <header class="glass-header">
            <div class="logo">
                <i data-lucide="shield-check" class="logo-icon" style="color: var(--primary);"></i>
                <span style="font-weight:700; font-size:1.2rem;">ProctorAI Dashboard</span>
            </div>
            <div class="header-actions" style="display:flex; align-items:center; gap: 1rem;">
                <div class="status-indicator" id="globalStatusBanner" style="font-weight:600; padding:0.5rem 1rem; border-radius:8px; display:flex; align-items:center; gap:0.5rem; background: rgba(51,65,85,0.5);">
                    <span class="dot" id="sessionStatusDot" style="background:#64748b; width:10px; height:10px; border-radius:50%; box-shadow:0 0 10px #64748b;"></span>
                    <span id="globalStatusText">SESSION PENDING</span>
                </div>
                <div class="session-controls" style="display:flex; gap: 0.5rem; border-right: 1px solid #334155; padding-right: 1rem;">
                    <button id="endSessionBtn" style="background:var(--danger); color:#fff; padding:0.5rem 1rem; border-radius:6px; font-weight:600; font-size:0.85rem; border:none; cursor:pointer; display:flex; align-items:center; gap:0.4rem; box-shadow:0 4px 15px rgba(239,68,68,0.3); transition:all 0.2s;">
                        <i data-lucide="square" style="width:16px; height:16px;"></i> End Session
                    </button>
                </div>
                <div class="user-profile">
                    <img src="https://i.pravatar.cc/150?img=11" alt="Supervisor" class="avatar">
                    <span class="user-name">Supervisor</span>
                    <button id="logoutBtn" style="background:transparent;border:1px solid #334155;color:white;padding:0.4rem 0.8rem;border-radius:6px;cursor:pointer;margin-left:1rem;font-size:0.8rem;">Logout</button>
                </div>
            </div>
        </header>

        <main class="dashboard-grid" style="grid-template-columns: 1fr 2fr 1fr;">
            <!-- Left Column: Active Students Grid -->
            <div class="column left-col">
                <div class="card glass-card" style="height: 100%; display:flex; flex-direction:column;">
                    <div class="card-header" style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #334155; padding-bottom:1rem;">
                        <h3>Active Students</h3>
                        <a href="enrollment.html" style="background:var(--primary); color:white; padding:0.4rem 0.8rem; font-size:0.8rem; border-radius:6px; text-decoration:none; display:flex; align-items:center; gap:0.4rem;">
                            <i data-lucide="user-plus" style="width:14px; height:14px;"></i> Register
                        </a>
                    </div>
                    <div class="card-body" id="studentsGrid" style="flex:1; overflow-y:auto; padding-top:1rem; display:flex; flex-direction:column; gap:1rem;">
                        <div style="text-align:center; color:#94a3b8; font-size:0.9rem; padding:2rem 0;">
                            Waiting for students to enter the frame...
                        </div>
                    </div>
                </div>
            </div>

            <!-- Middle Column: Video Feed & Room Stats -->
            <div class="column main-col">
                <!-- Video Feed -->
                <div class="card glass-card video-card" id="video-feed" style="flex:1;">
                    <div class="card-header">
                        <h3>CCTV Live Feed</h3>
                    </div>
                    <div style="position:relative;width:100%;height:100%;min-height:400px;display:flex;align-items:center;justify-content:center;background:#000;border-radius:8px;overflow:hidden;">
                        <img src="/video_feed" alt="Live Camera Feed" style="width:100%;height:100%;object-fit:cover;">
                    </div>
                </div>
            </div>

            <!-- Right Column: Alerts -->
            <div class="column right-col">
                <!-- Alert Center -->
                <div class="card glass-card alerts-card" id="alerts" style="height:100%; display:flex; flex-direction:column;">
                    <div class="card-header">
                        <h3>Alert Center</h3>
                        <span class="badge warning" id="unknownCountBadge">0 Unknown</span>
                    </div>
                    <div class="alerts-list" id="alertsList" style="flex:1; overflow-y:auto; padding-top:1rem;">
                        <!-- Alerts injected via JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="main.js"></script>
    <script>
        lucide.createIcons();
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('/api/supervisor_logout', {method: 'POST'});
            window.location.href = 'supervisor_login.html';
        });
    </script>
</body>
</html>
